<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İşçi Siyahısı</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-4">

    <div class="max-w-7xl mx-auto bg-white rounded-2xl shadow-lg p-4 md:p-6">

        <!-- HEADER -->
        <div class="mb-6">
            <h2 class="text-2xl md:text-3xl font-bold text-gray-800">
                İşçi Siyahısı
            </h2>

            <p class="text-gray-500 text-sm mt-1">
                İşçiləri axtar və filter et
            </p>
        </div>

        <!-- FILTERS -->
        <form class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">

            <input id="searchInput"
                class="w-full border-2 border-gray-200 rounded-lg px-4 py-2
                focus:border-blue-400 focus:ring-4 focus:ring-blue-100
                focus:outline-none duration-300"
                placeholder="Adla axtar..."
                type="text"
            >

            <select id="selectDep"
                class="w-full border-2 border-gray-200 rounded-lg px-4 py-2
                focus:border-blue-400 focus:ring-4 focus:ring-blue-100
                focus:outline-none duration-300"
            >
                <option>Bütün departamentlər</option>
                <option value="Audio">Audio</option>
                <option value="Wearables">Wearables</option>
                <option value="Mobile">Mobile</option>
                <option value="Computing">Computing</option>
                <option value="Tablets">Tablets</option>
                <option value="Gaming">Gaming</option>
            </select>

            <select id="selectPrice"
                class="w-full border-2 border-gray-200 rounded-lg px-4 py-2
                focus:border-blue-400 focus:ring-4 focus:ring-blue-100
                focus:outline-none duration-300"
            >
                <option>Maaş aralığı (hamısı)</option>
                <option value="1">0 - 500 ₼</option>
                <option value="2">501 - 1000 ₼</option>
                <option value="3">1001+ ₼</option>
            </select>

        </form>

        <!-- TABLE -->
        <div class="overflow-x-auto rounded-xl border border-gray-200">

            <table class="w-full min-w-[700px]">

                <thead class="bg-blue-600 text-white">
                    <tr>
                        <th class="p-4 text-left">ID</th>
                        <th class="p-4 text-left">Adı</th>
                        <th class="p-4 text-left">Vəzifə</th>
                        <th class="p-4 text-left">Departament</th>
                        <th class="p-4 text-left">Maaş</th>
                    </tr>
                </thead>

                <tbody id="tbodylist" class="bg-white">

                   

                </tbody>

            </table>

        </div>

    </div>
<script src="app.js"> </script>
</body>
</html>
